<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagnostic Report Tool</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 20px; background: #f3f5f8; font-family: Arial, sans-serif; }
      .card { max-width: 550px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
      h2 { margin-top: 0; text-align: center; }
      label { display: block; margin-top: 15px; font-weight: bold; }
      input[type="file"] { width: 100%; margin-top: 5px; }
      button { width: 100%; padding: 12px; margin-top: 20px; border: none; border-radius: 5px; background: #007bff; color: white; font-size: 16px; cursor: pointer; }
      button:disabled { background: #cccccc; cursor: not-allowed; }
      .status { margin-top: 10px; color: green; text-align: center; font-size: 14px; }
      .error { margin-top: 10px; color: #dc3545; text-align: center; font-size: 14px; white-space: pre-line; }
      .loading { margin-top: 10px; text-align: center; font-size: 14px; display: none; }
      .note { margin-top: 15px; font-size: 12px; color: #666; text-align: center; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Diagnostic Report Tool</h2>
      
      <div id="savedStatus" class="status">
        ✅ Vikas Diagnostic Letterhead Loaded Automatically
      </div>

      <label>Upload Report PDF</label>
      <input type="file" id="reportInput" accept="application/pdf" />
      <button id="generateBtn">Generate Final PDF</button>
      
      <div id="loading" class="loading">Processing PDF... Please wait.</div>
      <div id="error" class="error"></div>
      <div class="note">
        Files are processed locally in your browser.<br />
        Nothing is uploaded to any server.
      </div>
    </div>

    <script>
      // CONFIG: Pulls the image directly from your repository path
      const LETTERHEAD_URL = 'Vikas Diagnostic Letter Head Final.png';
      
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      function showError(msg) { document.getElementById('error').innerText = msg; }
      function clearError() { document.getElementById('error').innerText = ''; }
      function setLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }

      window.onload = () => {
        document.getElementById('generateBtn').addEventListener('click', generatePDF);
      };

      async function renderPdfPageToImage(pdfDoc, pageNumber, scale = 2) {
        const page = await pdfDoc.getPage(pageNumber);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: context, viewport }).promise;
        return { image: canvas.toDataURL('image/png'), width: viewport.width, height: viewport.height };
      }

      async function generatePDF() {
        clearError();
        const reportFile = document.getElementById('reportInput').files[0];
        if (!reportFile) {
          alert('Please upload a report PDF');
          return;
        }

        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerText = 'Generating PDF...';
        setLoading(true);

        try {
          // 1. Fetch the letterhead image from your repository
          const lhResponse = await fetch(LETTERHEAD_URL);
          if (!lhResponse.ok) {
            throw new Error('Could not load the letterhead image from the repository.');
          }
          const lhBuffer = await lhResponse.arrayBuffer();

          // 2. Load Report PDF
          const reportBytes = await reportFile.arrayBuffer();
          const reportPdf = await pdfjsLib.getDocument({ data: reportBytes }).promise;

          // 3. Create Final PDF Document
          const finalPdf = await PDFLib.PDFDocument.create();
          
          // Embed your repository PNG
          const lhImage = await finalPdf.embedPng(lhBuffer);

          for (let i = 1; i <= reportPdf.numPages; i++) {
            const rendered = await renderPdfPageToImage(reportPdf, i, 2);
            const page = finalPdf.addPage([rendered.width, rendered.height]);

            // Report base layer
            const reportImage = await finalPdf.embedPng(rendered.image);
            page.drawImage(reportImage, { x: 0, y: 0, width: rendered.width, height: rendered.height });

            // Letterhead overlay layer
            page.drawImage(lhImage, { x: 0, y: 0, width: rendered.width, height: rendered.height });
          }

          const finalBytes = await finalPdf.save();
          const blob = new Blob([finalBytes], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'Final_Report_On_Letterhead.pdf';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          setTimeout(() => { URL.revokeObjectURL(url); }, 1000);
        } catch (error) {
          console.error(error);
          showError('Failed to process PDF.\n\nVerify that your letterhead file path is correct or try re-saving your report.');
        } finally {
          btn.disabled = false;
          btn.innerText = 'Generate Final PDF';
          setLoading(false);
        }
      }
    </script>
  </body>
</html>
